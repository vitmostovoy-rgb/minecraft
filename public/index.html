<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnubisWorld — Modded Minecraft Servers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eef9ff', 100:'#d8f1ff', 200:'#b9e8ff', 300:'#89dbff', 400:'#51c5ff', 500:'#29a4ff', 600:'#0d84ff', 700:'#006deb', 800:'#0859be', 900:'#0a4d95', 950:'#0c305a' },
                        surface: { 800:'#0f1117', 900:'#090a0d', 950:'#050507' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float:  { '0%,100%': { transform:'translateY(0)' }, '50%': { transform:'translateY(-12px)' } },
                        glow:   { '0%': { boxShadow:'0 0 20px rgba(41,164,255,.15)' }, '100%': { boxShadow:'0 0 40px rgba(41,164,255,.35)' } },
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .bg-grid { background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 60px 60px; }
        .glass { background: rgba(255,255,255,.04); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.08); }
        .card-hover { transition: transform .3s, box-shadow .3s; }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(41,164,255,.15); }
        .btn-glow { position:relative; overflow:hidden; }
        .btn-glow::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); transform:translateX(-100%); transition:transform .5s; }
        .btn-glow:hover::after { transform:translateX(100%); }
        .fade-section { opacity:0; transform:translateY(30px); transition:opacity .7s,transform .7s; }
        .fade-section.visible { opacity:1; transform:translateY(0); }
        .particles { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
        .particle { position:absolute; width:3px; height:3px; background:rgba(41,164,255,.3); border-radius:50%; animation: particleFloat linear infinite; }
        @keyframes particleFloat { 0% { transform:translateY(100vh) scale(0); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translateY(-10vh) scale(1); opacity:0; } }
        /* Lang switcher */
        .lang-menu { display:none; }
        .lang-wrap:hover .lang-menu, .lang-wrap:focus-within .lang-menu { display:block; }
    </style>
</head>
<body class="bg-surface-950 text-white antialiased">

<div class="particles" id="particles"></div>

<!-- ─── Navbar ─── -->

            <img src="logo.png" alt="Logo" class="w-9 h-9 rounded-lg group-hover:scale-110 transition-transform">

            <a href="#features" class="hover:text-white transition" data-i18n="nav_features"></a>
            <a href="#download" class="hover:text-white transition" data-i18n="nav_download"></a>
            <a href="#community" class="hover:text-white transition" data-i18n="nav_community"></a>

            </button>
        </div>
    </div>
    <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 space-y-2 text-sm font-medium text-gray-400">
        <a href="#servers" class="block py-2 hover:text-white transition" data-i18n="nav_servers"></a>
        <a href="#features" class="block py-2 hover:text-white transition" data-i18n="nav_features"></a>
        <a href="#download" class="block py-2 hover:text-white transition" data-i18n="nav_download"></a>
        <a href="#community" class="block py-2 hover:text-white transition" data-i18n="nav_community"></a>

</nav>

<!-- ─── Download ─── -->

const langMeta = { ru: { flag: "\u{1F1F7}\u{1F1FA}", label: "RU" }, ua: { flag: "\u{1F1FA}\u{1F1E6}", label: "UA" }, en: { flag: "\u{1F1EC}\u{1F1E7}", label: "EN" }, de: { flag: "\u{1F1E9}\u{1F1EA}", label: "DE" }, pl: { flag: "\u{1F1F5}\u{1F1F1}", label: "PL" } };

function applyLang(lang) {
    const t = i18n[lang];
    if (!t) return;
    document.documentElement.lang = lang === 'ua' ? 'uk' : lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const key = el.getAttribute('data-i18n-html');
        if (t[key]) el.innerHTML = t[key];
    });
    document.getElementById('langFlag').textContent = langMeta[lang].flag;
    document.getElementById('langLabel').textContent = langMeta[lang].label;
}

function setLang(lang) {
    localStorage.setItem('aw_lang', lang);
    applyLang(lang);
}

// Init language
(function() {
    const saved = localStorage.getItem('aw_lang');
    const browserLang = navigator.language.slice(0,2);
    const langMap = { ru:'ru', uk:'ua', ua:'ua', de:'de', pl:'pl', en:'en' };
    const detected = saved || langMap[browserLang] || 'en';
    const lang = i18n[detected] ? detected : 'en';
    applyLang(lang);
})();

// Mobile menu toggle
document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('hidden');
});
document.querySelectorAll('#mobileMenu a').forEach(a => {
    a.addEventListener('click', () => document.getElementById('mobileMenu').classList.add('hidden'));
});

// Scroll fade-in
const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-section').forEach(el => observer.observe(el));

// Animated counter
function animateCounter(el, target, duration = 2000) {
    let start = 0;
    const step = (ts) => {
        if (!start) start = ts;
        const progress = Math.min((ts - start) / duration, 1);
        el.textContent = Math.floor(progress * target);
        if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
}
const statEl = document.getElementById('statPlayers');
const statObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) { animateCounter(statEl, 150); statObserver.disconnect(); }
});
statObserver.observe(statEl);

// Particles
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(p);
}
</script>
